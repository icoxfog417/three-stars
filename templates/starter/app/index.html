<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            padding: 2rem;
            text-align: center;
        }
        h1 { font-size: 2rem; color: #ffd700; }
        .subtitle { color: #888; margin-top: 0.5rem; }
        .chat-container {
            width: 100%;
            max-width: 700px;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }
        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            max-width: 85%;
        }
        .message.user {
            background: #1a3a5c;
            margin-left: auto;
        }
        .message.assistant {
            background: #1a1a2e;
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 0;
        }
        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #ffd700; }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #ffd700;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #ffed4a; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>My AI App</h1>
        <p class="subtitle">Powered by Amazon Bedrock AgentCore</p>
    </header>
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Ask me anything..." autofocus>
            <button id="send" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            inputEl.value = '';
            sendBtn.disabled = true;

            try {
                const resp = await fetch('/api/invoke', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const data = await resp.json();
                addMessage(data.message || data.response || JSON.stringify(data), 'assistant');
            } catch (err) {
                addMessage('Error: Could not reach the agent. Is it deployed?', 'assistant');
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
    </script>
</body>
</html>

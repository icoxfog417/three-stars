<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            padding: 2rem;
            text-align: center;
        }
        h1 { font-size: 2rem; color: #ffd700; }
        .subtitle { color: #888; margin-top: 0.5rem; }
        .chat-container {
            width: 100%;
            max-width: 700px;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }
        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            max-width: 85%;
            white-space: pre-wrap;
        }
        .message.user {
            background: #1a3a5c;
            margin-left: auto;
        }
        .message.assistant {
            background: #1a1a2e;
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 0;
        }
        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #ffd700; }
        button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            background: #ffd700;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #ffed4a; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>My AI App</h1>
        <p class="subtitle">Powered by Amazon Bedrock AgentCore</p>
    </header>
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Ask me anything..." autofocus>
            <button id="send" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        function extractText(event) {
            if (typeof event === 'string') return event;
            if (!event || typeof event !== 'object') return '';
            if (typeof event.data === 'string') return event.data;
            if (typeof event.text === 'string') return event.text;
            if (event.delta && typeof event.delta.text === 'string') return event.delta.text;
            if (event.contentBlockDelta &&
                event.contentBlockDelta.delta &&
                typeof event.contentBlockDelta.delta.text === 'string') {
                return event.contentBlockDelta.delta.text;
            }
            if (typeof event.message === 'string') return event.message;
            return '';
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            inputEl.value = '';
            sendBtn.disabled = true;

            const msgDiv = addMessage('', 'assistant');

            try {
                const resp = await fetch('/api/invoke', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                const contentType = resp.headers.get('Content-Type') || '';

                if (contentType.includes('text/event-stream')) {
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (!line.startsWith('data:')) continue;
                            const payload = line.slice(5).trim();
                            if (!payload || payload === '[DONE]') continue;
                            try {
                                const event = JSON.parse(payload);
                                const chunk = extractText(event);
                                if (chunk) {
                                    msgDiv.textContent += chunk;
                                    messagesEl.scrollTop = messagesEl.scrollHeight;
                                }
                            } catch (_) { /* skip malformed SSE lines */ }
                        }
                    }
                } else {
                    const data = await resp.json();
                    msgDiv.textContent = data.message || data.response || JSON.stringify(data);
                }

                if (!msgDiv.textContent) {
                    msgDiv.textContent = '(empty response)';
                }
            } catch (err) {
                msgDiv.textContent = 'Error: Could not reach the agent. Is it deployed?';
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
